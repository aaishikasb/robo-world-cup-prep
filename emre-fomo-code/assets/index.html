<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>miniAuto · Live Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: #fff; }

    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444; flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.live  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    #status-dot.warn  { background: #f59e0b; }
    #status-dot.error { background: #ef4444; }
    #status-text { color: #888; font-size: 11px; margin-left: auto; }

    main { flex: 1; display: flex; overflow: hidden; }

    #feed-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #0d0d0d; overflow: hidden; position: relative;
    }
    #preview {
      max-width: 100%; max-height: 100%;
      width: auto; height: auto;
      display: block; object-fit: contain; border-radius: 4px;
    }
    #no-signal {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: #444; font-size: 12px;
    }
    #no-signal svg { opacity: 0.25; }
    #no-signal.hidden { display: none; }

    aside {
      width: 220px; flex-shrink: 0;
      background: #141414; border-left: 1px solid #222;
      display: flex; flex-direction: column; overflow: hidden;
    }
    aside h2 {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: #555;
      padding: 10px 12px 6px; border-bottom: 1px solid #1e1e1e;
    }
    #detections-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }

    .detection-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 7px 9px;
    }
    .detection-card.ball { border-color: #ca8a04; background: #1c1700; }
    .det-label { font-size: 12px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
    .detection-card.ball .det-label { color: #fbbf24; }
    .det-bar-wrap { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .det-bar { height: 100%; border-radius: 2px; background: #22c55e; transition: width 0.15s; }
    .detection-card.ball .det-bar { background: #f59e0b; }
    .det-score { font-size: 10px; color: #666; margin-top: 3px; }
    #no-detections { color: #333; font-size: 11px; padding: 8px; text-align: center; }

    footer {
      display: flex; gap: 18px; align-items: center;
      padding: 5px 14px; background: #111; border-top: 1px solid #1e1e1e;
      flex-shrink: 0; font-size: 11px; color: #444;
    }
    .stat { display: flex; gap: 5px; align-items: center; }
    .stat-val { color: #aaa; font-weight: 600; }

    #chase-badge {
      margin-left: auto; padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      background: #1a1a1a; color: #444; border: 1px solid #2a2a2a;
      transition: all 0.2s;
    }
    #chase-badge.active {
      background: #1c1700; color: #fbbf24; border-color: #ca8a04;
      box-shadow: 0 0 8px #f59e0b44;
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>miniAuto · Live Feed</h1>
  <span id="status-text">connecting…</span>
</header>

<main>
  <div id="feed-wrap">
    <img id="preview" alt="camera feed">
    <div id="no-signal">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3l18 18M9.5 4.5A9 9 0 0 1 21 12M6.5 7.5A5 5 0 0 0 3 12M12 12v.01"/>
      </svg>
      waiting for camera…
    </div>
  </div>

  <aside>
    <h2>Detections</h2>
    <div id="detections-list">
      <div id="no-detections">none yet</div>
    </div>
  </aside>
</main>

<footer>
  <div class="stat">FPS <span id="fps-val" class="stat-val">—</span></div>
  <div class="stat">Inference <span id="inf-val" class="stat-val">—</span></div>
  <div class="stat">DSP <span id="dsp-val" class="stat-val">—</span></div>
  <div id="chase-badge">IDLE</div>
</footer>

<script>
  const preview      = document.getElementById("preview");
  const noSignal     = document.getElementById("no-signal");
  const statusDot    = document.getElementById("status-dot");
  const statusText   = document.getElementById("status-text");
  const detList      = document.getElementById("detections-list");
  const noDetEl      = document.getElementById("no-detections");
  const fpsVal       = document.getElementById("fps-val");
  const infVal       = document.getElementById("inf-val");
  const dspVal       = document.getElementById("dsp-val");
  const chaseBadge   = document.getElementById("chase-badge");

  const BALL_LABEL = "soccer_ball";
  let frameCount = 0, fps = 0, fpsTimer = Date.now();

  function setStatus(state, text) {
    statusDot.className = state;
    statusText.textContent = text;
  }

  function renderDetections(detections, timing) {
    frameCount++;
    const now = Date.now();
    if (now - fpsTimer >= 1000) {
      fps = frameCount; frameCount = 0; fpsTimer = now;
    }
    fpsVal.textContent = fps;

    if (timing) {
      infVal.textContent = timing.classification != null ? timing.classification + "ms" : "—";
      dspVal.textContent = timing.dsp != null ? timing.dsp + "ms" : "—";
    }

    const hasBall = detections.some(d => d.label === BALL_LABEL);
    chaseBadge.textContent = hasBall ? "⚽ CHASING" : "IDLE";
    chaseBadge.classList.toggle("active", hasBall);

    detList.innerHTML = "";
    if (detections.length === 0) {
      detList.appendChild(noDetEl);
      noDetEl.style.display = "";
      return;
    }
    noDetEl.style.display = "none";

    for (const d of detections) {
      const isBall = d.label === BALL_LABEL;
      const pct = Math.round(d.score * 100);
      const card = document.createElement("div");
      card.className = "detection-card" + (isBall ? " ball" : "");
      card.innerHTML = `
        <div class="det-label">${d.label}</div>
        <div class="det-bar-wrap"><div class="det-bar" style="width:${pct}%"></div></div>
        <div class="det-score">${pct}% · ${d.width}×${d.height} @ (${d.x},${d.y})</div>`;
      detList.appendChild(card);
    }
  }

  async function refreshFrame() {
    try {
      const res = await fetch("/preview?t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const frame = await res.json();

      if (!frame.image) {
        setStatus("warn", "waiting for camera");
        noSignal.classList.remove("hidden");
        return;
      }

      preview.src = "data:image/jpeg;base64," + frame.image;
      noSignal.classList.add("hidden");
      setStatus("live", "live");
      renderDetections(frame.result?.detections ?? [], frame.result?.timing ?? {});

    } catch (err) {
      setStatus("error", "error: " + err.message);
      noSignal.classList.remove("hidden");
    }
  }

  // Chain polls so slow inference doesn't cause pileup
  async function poll() {
    await refreshFrame();
    setTimeout(poll, 100);
  }
  poll();
</script>
</body>
</html>
